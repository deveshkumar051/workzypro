version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: workzy_helper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/schemas/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/database/seeds/services.sql:/docker-entrypoint-initdb.d/02_seed.sql

volumes:
  pgdata:
